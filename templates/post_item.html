{% extends 'base.html' %}
{% block title %}Post an Item{% endblock %}
{% block content %}
<div class='form-container'>
  <h2>Post a Lost or Found Item</h2>
  <form method='POST' enctype='multipart/form-data'>
    <div class='form-row'>
      <div class='form-group'>
        <label>Type</label>
        <select name='item_type' required>
          <option value='lost'>I Lost this item</option>
          <option value='found'>I Found this item</option>
        </select>
      </div>
      <div class='form-group'>
        <label>Category</label>
        <select name='category' required>
          <option value='electronics'>Electronics</option>
          <option value='clothing'>Clothing</option>
          <option value='books'>Books</option>
          <option value='accessories'>Accessories</option>
          <option value='keys'>Keys</option>
          <option value='other'>Other</option>
        </select>
      </div>
    </div>
    <div class='form-group'>
      <label>Item Title</label>
      <input type='text' name='title' required placeholder='e.g. Blue Nike Backpack'>
    </div>
    <div class='form-group'>
      <label>Description</label>
      <textarea name='description' rows='4' placeholder='Describe the item in detail...'></textarea>
    </div>
    <div class='form-row'>
      <div class='form-group'>
        <label>Location</label>
        <input type='text' name='location' placeholder='e.g. Library, Block A'>
      </div>
      <div class='form-group'>
        <label>Date Lost/Found</label>
        <input type='date' name='date_lost'>
      </div>
    </div>
    <div class='form-group'>
      <label>Upload Image (optional)</label>
      <input type='file' name='image' accept='image/*'>
    </div>
    <button type='submit' class='btn btn-primary'>Post Item</button>
  </form>
</div>
{% endblock %}
